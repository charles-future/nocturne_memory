<?xml version="1.0" encoding="UTF-8"?>
<svg width="860" height="540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="gl-b" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gl-g" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4ade80"/></marker>
    <marker id="ap" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#c084fc"/></marker>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#fb923c"/></marker>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="10"/>

  <!-- Title -->
  <text x="430" y="32" font-family="Arial, sans-serif" font-size="20" fill="#f8fafc" text-anchor="middle" font-weight="bold">Data Model: 4-Entity Topology</text>
  <text x="430" y="52" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Content-Path separation enables: Safe modifications, Zero-redundancy aliases, and Simplistic AI interfacing</text>

  <!-- ===== LEFT: Access Layer ===== -->
  <g transform="translate(30,75)">
    <rect x="0" y="0" width="380" height="220" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="2" filter="url(#gl-b)"/>
    <rect x="0" y="0" width="380" height="36" rx="8" fill="#1e3a5f"/><rect x="0" y="20" width="380" height="16" fill="#1e3a5f"/>
    <text x="190" y="24" font-family="'Courier New',monospace" font-size="14" fill="#93c5fd" text-anchor="middle" font-weight="bold">Access Layer (paths + edges)</text>

    <text x="15" y="56" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8">route_uri</text>
    <text x="210" y="56" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8">pri</text>
    <text x="280" y="56" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8">target_node</text>
    <line x1="10" y1="62" x2="370" y2="62" stroke="#334155" stroke-width="1"/>

    <text x="15" y="86" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0"><tspan fill="#60a5fa" font-weight="bold">core://</tspan>agent</text>
    <text x="210" y="86" font-family="'Courier New',monospace" font-size="11" fill="#fbbf24">0</text>
    <rect x="265" y="74" width="80" height="18" rx="4" fill="#14332a" stroke="#4ade80" stroke-width="1"/>
    <text x="305" y="87" font-family="'Courier New',monospace" font-size="10" fill="#4ade80" text-anchor="middle">Node A1B2</text>

    <text x="15" y="114" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0"><tspan fill="#60a5fa" font-weight="bold">core://</tspan>agent/my_user</text>
    <text x="210" y="114" font-family="'Courier New',monospace" font-size="11" fill="#fbbf24">0</text>
    <rect x="265" y="102" width="80" height="18" rx="4" fill="#2d1b4e" stroke="#c084fc" stroke-width="1"/>
    <text x="305" y="115" font-family="'Courier New',monospace" font-size="10" fill="#c084fc" text-anchor="middle">Node C3D4</text>

    <text x="15" y="140" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0"><tspan fill="#22d3ee" font-weight="bold">link://</tspan>the_girl_i_love</text>
    <text x="210" y="140" font-family="'Courier New',monospace" font-size="11" fill="#fbbf24">1</text>
    <rect x="265" y="128" width="80" height="18" rx="4" fill="#2d1b4e" stroke="#c084fc" stroke-width="1"/>
    <text x="305" y="141" font-family="'Courier New',monospace" font-size="10" fill="#c084fc" text-anchor="middle">Node C3D4</text>

    <text x="15" y="170" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0"><tspan fill="#a78bfa" font-weight="bold">writer://</tspan>novel/ch1</text>
    <text x="210" y="170" font-family="'Courier New',monospace" font-size="11" fill="#fbbf24">2</text>
    <rect x="265" y="158" width="80" height="18" rx="4" fill="#3f2310" stroke="#fb923c" stroke-width="1"/>
    <text x="305" y="171" font-family="'Courier New',monospace" font-size="10" fill="#fb923c" text-anchor="middle">Node E5F6</text>

    <line x1="10" y1="186" x2="370" y2="186" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="190" y="200" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Every row = one URI entrance (read/write path)</text>
    <text x="190" y="214" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">↑ Same target_node = Alias (cross-domain pointers)</text>
  </g>

  <!-- ===== RIGHT: Content Layer ===== -->
  <g transform="translate(480,75)">
    <rect x="0" y="0" width="350" height="220" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="2" filter="url(#gl-g)"/>
    <rect x="0" y="0" width="350" height="36" rx="8" fill="#14332a"/><rect x="0" y="20" width="350" height="16" fill="#14332a"/>
    <text x="175" y="24" font-family="'Courier New',monospace" font-size="14" fill="#86efac" text-anchor="middle" font-weight="bold">Content Layer (nodes + memories)</text>

    <text x="15" y="56" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8">node</text>
    <text x="95" y="56" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8">id</text>
    <text x="130" y="56" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8">content</text>
    <text x="260" y="56" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8">deprecated →</text>
    <line x1="10" y1="62" x2="340" y2="62" stroke="#334155" stroke-width="1"/>

    <rect x="10" y="70" width="75" height="42" rx="4" fill="#14332a" stroke="#4ade80" stroke-width="1"/>
    <text x="47" y="95" font-family="'Courier New',monospace" font-size="10" fill="#4ade80" text-anchor="middle">Node A1B2</text>
    <text x="95" y="86" font-family="'Courier New',monospace" font-size="11" fill="#f87171">#41</text>
    <text x="130" y="86" font-family="'Courier New',monospace" font-size="10" fill="#64748b" text-decoration="line-through">(old version)</text>
    <text x="260" y="86" font-family="'Courier New',monospace" font-size="11" fill="#f87171">true  →#42</text>
    <line x1="90" y1="93" x2="340" y2="93" stroke="#334155" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="95" y="107" font-family="'Courier New',monospace" font-size="11" fill="#4ade80" font-weight="bold">#42</text>
    <text x="130" y="107" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0">I am Nocturne...</text>
    <text x="260" y="107" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8">false</text>

    <rect x="10" y="122" width="75" height="22" rx="4" fill="#2d1b4e" stroke="#c084fc" stroke-width="1"/>
    <text x="47" y="137" font-family="'Courier New',monospace" font-size="10" fill="#c084fc" text-anchor="middle">Node C3D4</text>
    <text x="95" y="138" font-family="'Courier New',monospace" font-size="11" fill="#c084fc" font-weight="bold">#57</text>
    <text x="130" y="138" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0">Salem is my...</text>
    <text x="260" y="138" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8">false</text>

    <rect x="10" y="152" width="75" height="22" rx="4" fill="#3f2310" stroke="#fb923c" stroke-width="1"/>
    <text x="47" y="167" font-family="'Courier New',monospace" font-size="10" fill="#fb923c" text-anchor="middle">Node E5F6</text>
    <text x="95" y="168" font-family="'Courier New',monospace" font-size="11" fill="#fb923c" font-weight="bold">#89</text>
    <text x="130" y="168" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0">Chapter 1: The...</text>
    <text x="260" y="168" font-family="'Courier New',monospace" font-size="11" fill="#94a3b8">false</text>

    <line x1="10" y1="186" x2="340" y2="186" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="175" y="200" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Every row = an actual database row storing content</text>
    <text x="175" y="214" font-family="Arial, sans-serif" font-size="10" fill="#f87171" text-anchor="middle">↑ deprecated = auto-frozen old versions (AI sandboxed)</text>
  </g>

  <!-- ===== FK ARROWS ===== -->
  <line x1="395" y1="161" x2="487" y2="161" stroke="#4ade80" stroke-width="2" marker-end="url(#ag)" stroke-dasharray="5,3" opacity="0.9"/>
  <line x1="395" y1="186" x2="487" y2="208" stroke="#c084fc" stroke-width="2" marker-end="url(#ap)" stroke-dasharray="5,3" opacity="0.9"/>
  <line x1="395" y1="214" x2="487" y2="208" stroke="#c084fc" stroke-width="2" marker-end="url(#ap)" stroke-dasharray="5,3" opacity="0.9"/>
  <line x1="395" y1="244" x2="487" y2="240" stroke="#fb923c" stroke-width="2" marker-end="url(#ao)" stroke-dasharray="5,3" opacity="0.9"/>

  <text x="440" y="204" font-family="Arial, sans-serif" font-size="11" fill="#22d3ee" text-anchor="middle" font-weight="bold">Alias</text>
  <text x="440" y="216" font-family="Arial, sans-serif" font-size="9" fill="#22d3ee" text-anchor="middle">same Node</text>

  <!-- ===== BOTTOM: 3 Feature Cards (User Pain-Point Driven) ===== -->
  <!-- 1. 🛡️ AI Errors? Fallback (Merge Delete/Update safety) -->
  <g transform="translate(30,335)">
    <rect x="0" y="0" width="250" height="170" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="15" fill="#fca5a5" text-anchor="middle" font-weight="bold">🛡️ AI Errors? 1-Click Rollback</text>
    <line x1="15" y1="40" x2="235" y2="40" stroke="#334155" stroke-width="1"/>
    <text x="15" y="65" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">Updates automatically freeze old memory</text>
    <text x="15" y="85" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">versions. Deletions by AI merely sever URI</text>
    <text x="15" y="105" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">pointers (soft delete). Any AI-driven</text>
    <text x="15" y="125" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">change can be undone from the dashboard.</text>
    
    <text x="15" y="155" font-family="Arial, sans-serif" font-size="12" fill="#fca5a5" font-weight="bold">→ Full safety: let AI edit fearlessly.</text>
  </g>

  <!-- 2. 🕸️ Zero-Redundancy Alias -->
  <g transform="translate(305,335)">
    <rect x="0" y="0" width="250" height="170" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="15" fill="#67e8f9" text-anchor="middle" font-weight="bold">🕸️ Zero-Redundancy Aliases</text>
    <line x1="15" y1="40" x2="235" y2="40" stroke="#334155" stroke-width="1"/>
    <text x="15" y="65" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">The same event can be pinned in 'Work'</text>
    <text x="15" y="85" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">and 'Life' domains simultaneously. Aliases</text>
    <text x="15" y="105" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">allow countless distinct URI paths to</text>
    <text x="15" y="125" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">target a single underlying Node.</text>
    
    <text x="15" y="155" font-family="Arial, sans-serif" font-size="12" fill="#67e8f9" font-weight="bold">→ Edit once, updates everywhere.</text>
  </g>

  <!-- 3. 🧠 Simplistic AI Interface -->
  <g transform="translate(580,335)">
    <rect x="0" y="0" width="250" height="170" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
    <text x="125" y="25" font-family="Arial, sans-serif" font-size="14" fill="#86efac" text-anchor="middle" font-weight="bold">🧠 Tree Frontend, Graph Backend</text>
    <line x1="15" y1="40" x2="235" y2="40" stroke="#334155" stroke-width="1"/>
    <text x="15" y="65" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">AI only sees a straightforward folder/URI</text>
    <text x="15" y="85" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">interface. All complex cascading, cycle</text>
    <text x="15" y="105" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">avoidance, and garbage collection mechanisms</text>
    <text x="15" y="125" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">are silently handled by the graph engine.</text>
    
    <text x="15" y="155" font-family="Arial, sans-serif" font-size="12" fill="#86efac" font-weight="bold">→ Let LLMs use simple tools, reliably.</text>
  </g>
</svg>
