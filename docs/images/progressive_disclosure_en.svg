<svg xmlns="http://www.w3.org/2000/svg" width="820" height="640" viewBox="0 0 820 640">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#0f1019"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="640" rx="12" fill="url(#bgGrad)"/>

  <!-- Terminal title bar -->
  <rect width="820" height="36" rx="12" fill="#2a2b3d"/>
  <rect y="24" width="820" height="12" fill="#2a2b3d"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="410" y="23" text-anchor="middle" font-family="SF Mono, Consolas, monospace" font-size="13" fill="#8888aa">read_memory("core://nocturne_memory")</text>

  <!-- Section 1: Current Node Content -->
  <text x="30" y="68" font-family="SF Mono, Consolas, monospace" font-size="13" fill="#6a9fb5">MEMORY:</text>
  <text x="100" y="68" font-family="SF Mono, Consolas, monospace" font-size="13" fill="#e8e8e8">core://nocturne_memory</text>
  <text x="30" y="88" font-family="SF Mono, Consolas, monospace" font-size="11" fill="#444466">════════════════════════════════════════════════════════════════</text>

  <!-- Content area -->
  <rect x="20" y="96" width="780" height="120" rx="6" fill="#1e1f33" opacity="0.6"/>

  <text x="35" y="118" font-family="SF Mono, Consolas, monospace" font-size="14" font-weight="bold" fill="#c9a0dc"># Nocturne Memory</text>
  <text x="35" y="142" font-family="SF Mono, Consolas, monospace" font-size="12.5" fill="#b0b0c8">A lightweight AI memory system. Dual frontend: MCP for AI, Web UI</text>
  <text x="35" y="160" font-family="SF Mono, Consolas, monospace" font-size="12.5" fill="#b0b0c8">for humans. SQLite backend, fully local, no server required.</text>
  <text x="35" y="182" font-family="SF Mono, Consolas, monospace" font-size="12.5" fill="#b0b0c8">Memories are organized as a URI tree with progressive disclosure.</text>
  <text x="35" y="202" font-family="SF Mono, Consolas, monospace" font-size="12.5" fill="#b0b0c8">Path and content are stored separately — one memory, many paths.</text>

  <!-- Label -->
  <rect x="618" y="100" width="174" height="28" rx="14" fill="#c9a0dc" opacity="0.15"/>
  <text x="705" y="119" text-anchor="middle" font-family="SF Mono, Consolas, monospace" font-size="11" fill="#c9a0dc">▲ Loaded into context</text>

  <!-- Section 2: Child Memories -->
  <text x="30" y="240" font-family="SF Mono, Consolas, monospace" font-size="11" fill="#444466">════════════════════════════════════════════════════════════════</text>
  <text x="30" y="262" font-family="SF Mono, Consolas, monospace" font-size="13" fill="#6a9fb5">CHILD MEMORIES</text>
  <text x="175" y="262" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#666688">(use read_memory with URI to access)</text>
  <text x="30" y="280" font-family="SF Mono, Consolas, monospace" font-size="11" fill="#444466">════════════════════════════════════════════════════════════════</text>

  <!-- Child 1: Tools -->
  <rect x="20" y="290" width="780" height="68" rx="6" fill="#1a2a1a" opacity="0.4"/>
  <text x="35" y="314" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#7ec87e">-</text>
  <text x="50" y="314" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#88aacc">URI:</text>
  <text x="90" y="314" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#e8e8e8">core://nocturne_memory/mcp_tools</text>
  <text x="380" y="314" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#febc2e">[★1]</text>
  <text x="50" y="340" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#88aacc">When to recall:</text>
  <text x="200" y="340" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#aaaacc" font-style="italic">When the AI needs to create, update, search, or delete memories</text>

  <!-- Child 2: Architecture -->
  <rect x="20" y="366" width="780" height="68" rx="6" fill="#1a2a1a" opacity="0.4"/>
  <text x="35" y="390" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#7ec87e">-</text>
  <text x="50" y="390" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#88aacc">URI:</text>
  <text x="90" y="390" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#e8e8e8">core://nocturne_memory/architecture</text>
  <text x="408" y="390" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#febc2e">[★2]</text>
  <text x="50" y="416" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#88aacc">When to recall:</text>
  <text x="200" y="416" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#aaaacc" font-style="italic">When discussing path/content separation or version control</text>

  <!-- Child 3: Web UI -->
  <rect x="20" y="442" width="780" height="68" rx="6" fill="#1a2a1a" opacity="0.4"/>
  <text x="35" y="466" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#7ec87e">-</text>
  <text x="50" y="466" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#88aacc">URI:</text>
  <text x="90" y="466" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#e8e8e8">core://nocturne_memory/web_ui</text>
  <text x="365" y="466" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#febc2e">[★2]</text>
  <text x="50" y="492" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#88aacc">When to recall:</text>
  <text x="200" y="492" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#aaaacc" font-style="italic">When the user asks about reviewing, auditing, or rolling back memories</text>

  <!-- More indicator -->
  <text x="35" y="536" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#666688">...</text>
  <text x="60" y="536" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#666688">(2 more child nodes)</text>

  <!-- Label -->
  <rect x="555" y="524" width="240" height="28" rx="14" fill="#7ec87e" opacity="0.12"/>
  <text x="675" y="543" text-anchor="middle" font-family="SF Mono, Consolas, monospace" font-size="11" fill="#7ec87e">▼ Not loaded — just a directory</text>

  <!-- Bottom annotation -->
  <rect x="20" y="565" width="780" height="60" rx="8" fill="#2a2b3d" opacity="0.5"/>
  <text x="410" y="588" text-anchor="middle" font-family="SF Mono, Consolas, monospace" font-size="12.5" fill="#febc2e" filter="url(#glow)">💡 The AI only reads deeper when the conversation needs it.</text>
  <text x="410" y="610" text-anchor="middle" font-family="SF Mono, Consolas, monospace" font-size="11.5" fill="#888899">Context stays small. Memory capacity stays unlimited.</text>
</svg>
