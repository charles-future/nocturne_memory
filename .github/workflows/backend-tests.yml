name: Backend Tests

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run backend test suite (SQLite)
        run: pytest backend/tests --cov=backend --cov-report=term-missing --cov-report=xml

  backend-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nocturne_memory
          POSTGRES_USER: nocturne
          POSTGRES_PASSWORD: nocturne
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nocturne -d nocturne_memory"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run PostgreSQL integration smoke tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://nocturne:nocturne@127.0.0.1:5432/nocturne_memory?ssl=disable
        run: pytest backend/tests/service backend/tests/api -q
